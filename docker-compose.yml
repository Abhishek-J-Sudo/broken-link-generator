services:
  postgres:
    image: postgres:16-alpine
    container_name: seoscrub-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: seoscrub
    ports:
      - "5433:5432"
    volumes:
      - seoscrub-postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: seoscrub-redis
    ports:
      - "6380:6379"
    volumes:
      - seoscrub-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  seoscrub-postgres-data:
  seoscrub-redis-data:
